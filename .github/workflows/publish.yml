name: Publish SDK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (react | js | all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - react
          - js

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        run: pnpm turbo build --filter=@normy/react --filter=@normy/js

      - name: Publish @normy/react
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == 'react'
        run: pnpm publish --filter @normy/react --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @normy/js
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == 'js'
        run: pnpm publish --filter @normy/js --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
